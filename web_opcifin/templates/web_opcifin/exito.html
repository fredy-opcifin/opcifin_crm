<!DOCTYPE html>
<html lang="es">
<head>

    <title>Solicitud Recibida - OPCIFIN</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 40px; border-radius: 10px; display: inline-block; border-top: 5px solid #D4AF37; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #001A33; }
        p { color: #666; font-size: 18px; }
        .btn-volver { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #00A3D3; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Solicitud Recibida con Éxito!</h1>
        <p>Hola <strong>{{ nombre }}</strong>, hemos recibido tus documentos correctamente.</p>
        <p>Nuestro equipo de analistas revisará tu información y te contactaremos pronto.</p>
        <a href="/" class="btn-volver">Volver al Inicio</a>
    </div>
</body>
</html>
