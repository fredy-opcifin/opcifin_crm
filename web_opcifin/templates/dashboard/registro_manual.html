{% extends 'dashboard/main.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-header bg-white border-0 pt-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="fw-bold mb-0 text-primary"><i class="fas fa-user-plus me-2"></i>Nuevo Lead</h3>
                        <span class="badge bg-light text-muted p-2">OPCIFIN CRM 2.0</span>
                    </div>
                </div>
                <div class="card-body p-4">
                    <form method="POST" class="needs-validation">
                        {% csrf_token %}

                        <h6 class="text-uppercase text-muted small fw-bold mb-3 border-bottom pb-2">Información del Cliente</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold small">Nombre Completo *</label>
                                <input type="text" name="nombre_completo" class="form-control border-light-subtle" required placeholder="Ej: Hernán Díaz">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Cédula</label>
                                <input type="text" name="cedula" class="form-control border-light-subtle" placeholder="12345678">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Teléfono *</label>
                                <input type="text" name="telefono" class="form-control border-light-subtle" required placeholder="300 000 0000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Correo Electrónico</label>
                                <input type="email" name="email" class="form-control border-light-subtle" placeholder="cliente@correo.com">
                            </div>
                        </div>

                        <h6 class="text-uppercase text-muted small fw-bold mb-3 border-bottom pb-2">Nicho y Fuente</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Nicho (Perfil Laboral) *</label>
                                <select name="nicho" class="form-select border-light-subtle" required>
                                    <option value="" selected disabled>Seleccionar nicho</option>
                                    <option value="DOCENTE">Docente</option>
                                    <option value="PENSIONADO">Pensionado</option>
                                    <option value="SERVIDOR_PUBLICO">Servidor Público</option>
                                    <option value="FUERZAS_ARMADAS">Fuerzas Armadas</option>
                                    <option value="INDEPENDIENTE">Independiente</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Fuente de Captación *</label>
                                <select name="fuente" class="form-select border-light-subtle" required>
                                    <option value="" selected disabled>¿Cómo llegó?</option>
                                    <option value="WHATSAPP">WhatsApp</option>
                                    <option value="FACEBOOK">Facebook</option>
                                    <option value="INSTAGRAM">Instagram</option>
                                    <option value="TIKTOK">TikTok</option>
                                    <option value="WEB">Sitio Web</option>
                                    <option value="REFERIDO">Referido</option>
                                    <option value="LLAMADA">Llamada</option>
                                </select>
                            </div>
                        </div>

                        <h6 class="text-uppercase text-muted small fw-bold mb-3 border-bottom pb-2">Detalles del Crédito</h6>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Ciudad</label>
                                <input type="text" name="ciudad" class="form-control border-light-subtle" placeholder="Valledupar">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Ingreso Mensual</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-success">$</span>
                                    <input type="number" name="ingreso_mensual" class="form-control border-start-0" placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Monto Solicitado</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-primary">$</span>
                                    <input type="number" name="monto_solicitado" class="form-control border-start-0" placeholder="0.00">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small">Prioridad</label>
                                <select name="prioridad" class="form-select border-light-subtle">
                                    <option value="BAJA">Baja</option>
                                    <option value="MEDIA" selected>Media</option>
                                    <option value="ALTA">Alta</option>
                                    <option value="URGENTE">Urgente</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-bold small">Notas Internas</label>
                                <textarea name="notas" class="form-control border-light-subtle" rows="2" placeholder="Detalles adicionales..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 pt-3 border-top">
                            <a href="{% url 'leads_list' %}" class="btn btn-light px-4" style="border-radius: 10px;">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4 flex-grow-1" style="border-radius: 10px;">Crear Lead</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
