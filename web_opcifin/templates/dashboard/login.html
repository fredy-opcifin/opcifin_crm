<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPCIFIN | Acceso al Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-opcifin { background: #1e293b; color: white; border-radius: 10px; padding: 12px; border: none; }
        .btn-opcifin:hover { background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div class="card login-card p-5 text-center">
        <div class="mb-4">
            <img src="/static/img/logo_opcifin_3.png" alt="OPCIFIN" width="180">
        </div>
        <h4 class="fw-bold mb-4">Acceso al Dashboard</h4>

        <form method="POST">
            {% csrf_token %}  <div class="mb-3 text-start">
                <label class="form-label small fw-bold">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-opcifin w-100 fw-bold">Iniciar Sesión</button>
        </form>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger mt-3 small">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
